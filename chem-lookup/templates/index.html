<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chemical Lookup</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --text: #e6edf3;
    --muted: #7d8590;
    --warn: #d29922;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  /* 背景グリッド */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 540px;
    position: relative;
    z-index: 1;
  }

  header {
    margin-bottom: 2.5rem;
  }

  .label-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  h1 {
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    margin-top: 0.5rem;
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 300;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.75rem;
    margin-bottom: 1rem;
  }

  .input-group {
    display: flex;
    gap: 0.75rem;
    align-items: stretch;
  }

  .input-wrapper {
    flex: 1;
    position: relative;
  }

  .input-hint {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.875rem 1rem;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(88,166,255,0.1);
  }

  button {
    background: var(--accent);
    color: #0d1117;
    border: none;
    border-radius: 8px;
    padding: 0 1.5rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
    margin-top: 1.35rem;
  }

  button:hover { opacity: 0.85; }
  button:active { transform: scale(0.97); }

  /* 結果表示 */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.75rem;
    display: none;
    animation: fadeUp 0.3s ease;
  }

  .result-card.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .compound-name {
    font-size: 1.8rem;
    font-weight: 500;
    letter-spacing: -0.02em;
    margin-bottom: 1rem;
  }

  .meta-row {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .meta-key {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .meta-val {
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    color: var(--text);
  }

  .diff-badge {
    display: inline-block;
    background: rgba(210,153,34,0.15);
    border: 1px solid rgba(210,153,34,0.3);
    color: var(--warn);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-top: 4px;
  }

  .diff-badge.exact {
    background: rgba(63,185,80,0.15);
    border-color: rgba(63,185,80,0.3);
    color: var(--accent2);
  }

  .error-msg {
    color: #f85149;
    font-size: 0.875rem;
    display: none;
    margin-top: 0.5rem;
  }

  .error-msg.visible { display: block; }

  footer {
    margin-top: 2rem;
    text-align: center;
    font-size: 0.8rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="label-tag">// analytical chemistry</div>
    <h1>Chemical <span>Lookup</span></h1>
    <p class="subtitle">数値を入力して最も近い化合物を検索する</p>
  </header>

  <div class="card">
    <div class="input-hint">value (e.g. wavelength, mass)</div>
    <div class="input-group">
      <div class="input-wrapper">
        <input type="number" id="valueInput" placeholder="例: 300" step="any" autofocus>
      </div>
      <button onclick="doSearch()">Search</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-label">// match found</div>
    <div class="compound-name" id="compoundName">—</div>
    <div class="meta-row">
      <div class="meta-item">
        <span class="meta-key">入力値</span>
        <span class="meta-val" id="inputVal">—</span>
      </div>
      <div class="meta-item">
        <span class="meta-key">一致した値</span>
        <span class="meta-val" id="matchedVal">—</span>
      </div>
      <div class="meta-item">
        <span class="meta-key">差分</span>
        <span class="diff-badge" id="diffBadge">—</span>
      </div>
    </div>
  </div>

  <footer>chemical-lookup · powered by Flask + Render</footer>
</div>

<script>
  const input = document.getElementById('valueInput');
  input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  async function doSearch() {
    const val = input.value.trim();
    const errEl = document.getElementById('errorMsg');
    const resultCard = document.getElementById('resultCard');

    errEl.classList.remove('visible');
    resultCard.classList.remove('visible');

    if (!val) {
      errEl.textContent = '数値を入力してください';
      errEl.classList.add('visible');
      return;
    }

    const res = await fetch('/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ value: val })
    });

    const data = await res.json();

    if (data.error) {
      errEl.textContent = data.error;
      errEl.classList.add('visible');
      return;
    }

    document.getElementById('compoundName').textContent = data.compound;
    document.getElementById('inputVal').textContent = data.input;
    document.getElementById('matchedVal').textContent = data.matched_value;

    const badge = document.getElementById('diffBadge');
    badge.textContent = data.difference === 0 ? '± 0 (完全一致)' : `± ${data.difference}`;
    badge.className = 'diff-badge' + (data.difference === 0 ? ' exact' : '');

    resultCard.classList.add('visible');
  }
</script>

</body>
</html>
