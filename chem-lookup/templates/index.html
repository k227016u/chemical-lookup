<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chemical Lookup</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --text: #e6edf3;
    --muted: #7d8590;
    --warn: #d29922;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 580px;
    position: relative;
    z-index: 1;
  }

  header { margin-bottom: 2.5rem; }

  .label-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  h1 {
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: -0.02em;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 0.5rem;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.75rem;
    margin-bottom: 1rem;
  }

  .input-hint {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .row {
    display: flex;
    gap: 0.75rem;
    align-items: flex-end;
    margin-bottom: 1rem;
  }

  .field {
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  input[type="number"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.875rem 1rem;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
    width: 100%;
  }

  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(88,166,255,0.1);
  }

  .toggle-group {
    display: flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 1rem;
  }

  .toggle-group label {
    flex: 1;
    text-align: center;
    padding: 0.6rem 0.5rem;
    font-size: 0.82rem;
    cursor: pointer;
    color: var(--muted);
    transition: background 0.15s, color 0.15s;
    user-select: none;
  }

  .toggle-group input[type="radio"] { display: none; }

  .toggle-group input[type="radio"]:checked + label {
    background: var(--accent);
    color: #0d1117;
    font-weight: 500;
  }

  button {
    background: var(--accent);
    color: #0d1117;
    border: none;
    border-radius: 8px;
    padding: 0.875rem 1.5rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    width: 100%;
  }

  button:hover { opacity: 0.85; }
  button:active { transform: scale(0.98); }

  .error-msg {
    color: #f85149;
    font-size: 0.875rem;
    display: none;
    margin-top: 0.5rem;
  }

  .error-msg.visible { display: block; }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.75rem;
    display: none;
    animation: fadeUp 0.3s ease;
  }

  .result-card.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .no-result {
    color: var(--muted);
    font-size: 0.9rem;
    text-align: center;
    padding: 1rem 0;
  }

  .result-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }

  .result-table th {
    text-align: left;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 0 0 0.5rem 0;
    border-bottom: 1px solid var(--border);
  }

  .result-table td {
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }

  .result-table tr:last-child td { border-bottom: none; }

  .diff-badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(210,153,34,0.15);
    border: 1px solid rgba(210,153,34,0.3);
    color: var(--warn);
  }

  .diff-badge.exact {
    background: rgba(63,185,80,0.15);
    border-color: rgba(63,185,80,0.3);
    color: var(--accent2);
  }

  .count-label {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 0.75rem;
    font-family: 'DM Mono', monospace;
  }

  footer {
    margin-top: 2rem;
    text-align: center;
    font-size: 0.8rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="label-tag">// analytical chemistry</div>
    <h1>Chemical <span>Lookup</span></h1>
    <p class="subtitle">数値と許容範囲を入力して化合物を検索する</p>
  </header>

  <div class="card">
    <div class="row">
      <div class="field">
        <div class="input-hint">value（波長・質量など）</div>
        <input type="number" id="valueInput" placeholder="例: 300" step="any">
      </div>
      <div class="field">
        <div class="input-hint">許容範囲</div>
        <input type="number" id="toleranceInput" placeholder="例: 10" step="any" min="0">
      </div>
    </div>

    <div class="toggle-group">
      <input type="radio" name="tolType" id="abs" value="absolute" checked>
      <label for="abs">絶対値（± 数値）</label>
      <input type="radio" name="tolType" id="rel" value="relative">
      <label for="rel">相対値（± %）</label>
    </div>

    <button onclick="doSearch()">Search</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-label">// results</div>
    <div class="count-label" id="countLabel"></div>
    <div id="resultBody"></div>
  </div>

  <footer>chemical-lookup · powered by Flask + Render</footer>
</div>

<script>
  const valueInput = document.getElementById('valueInput');
  const toleranceInput = document.getElementById('toleranceInput');

  [valueInput, toleranceInput].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
  });

  async function doSearch() {
    const val = valueInput.value.trim();
    const tol = toleranceInput.value.trim();
    const tolType = document.querySelector('input[name="tolType"]:checked').value;
    const errEl = document.getElementById('errorMsg');
    const resultCard = document.getElementById('resultCard');

    errEl.classList.remove('visible');
    resultCard.classList.remove('visible');

    if (!val) {
      errEl.textContent = '数値を入力してください';
      errEl.classList.add('visible');
      return;
    }

    const res = await fetch('/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ value: val, tolerance: tol || 0, tolerance_type: tolType })
    });

    const data = await res.json();

    if (data.error) {
      errEl.textContent = data.error;
      errEl.classList.add('visible');
      return;
    }

    const unit = tolType === 'absolute' ? '' : '%';
    document.getElementById('countLabel').textContent =
      `入力値: ${data.input}　許容範囲: ±${data.tolerance}${unit}　該当: ${data.count}件`;

    const body = document.getElementById('resultBody');

    if (data.count === 0) {
      body.innerHTML = '<div class="no-result">該当する化合物が見つかりませんでした</div>';
    } else {
      const rows = data.results.map(r => {
        const badgeClass = r.difference === 0 ? 'diff-badge exact' : 'diff-badge';
        const diffText = r.difference === 0 ? '完全一致' : `± ${r.difference}`;
        return `<tr>
          <td>${r.compound}</td>
          <td>${r.matched_value}</td>
          <td><span class="${badgeClass}">${diffText}</span></td>
        </tr>`;
      }).join('');

      body.innerHTML = `
        <table class="result-table">
          <thead>
            <tr>
              <th>化合物名</th>
              <th>登録値</th>
              <th>差分</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    resultCard.classList.add('visible');
  }
</script>

</body>
</html>
